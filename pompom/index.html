<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D model</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div id="stage"></div>
  <header>
    <h1>pompom purin?</h1>
    <p>一緒に遊んだり、色を変えられるよ</p>
  </header>
  <div class="ui-bottom">
    <div class="palette">
      <label class="color-pick" for="bodyColor">Body
        <input type="color" id="bodyColor" value="#fffdf6" />
      </label>
      <label class="color-pick" for="hatColor">Hat
        <input type="color" id="hatColor" value="#8b5e3c" />
      </label>
      <label class="color-pick" for="faceColor">Face
        <input type="color" id="faceColor" value="#5a3e2b" />
      </label>
      <label class="color-pick" for="umbrellaColor">Umbrella
        <input type="color" id="umbrellaColor" value="#4caf50" />
      </label>
    </div>
    <div class="controls">
      <button id="btnFront">まえをむく</button>
      <button id="btnJump">🦘Jump！</button>
      <button id="btnWave">てをふる</button>
      <button id="btnBothWave">りょうてをふる</button>
      <button id="btnKenkenpa">ケンケンパ</button>
      <button id="btnWink">ウィンク</button>
      <button id="btnSpin">くるっとまわる</button>
      <button id="btnHeadSpin">あたまをまわす</button>
      <button id="btnTouch">タッチ</button>
      <button id="btnUmbrellaHold">☂️をもつ</button>
      <button id="btnUmbrellaOpen">OPEN☂️</button>
      <button id="btnUmbrellaClose">CLOSE☂️</button>
      <button id="btnUmbrellaRelease">☂️をはなす</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="./script.js"></script>
</body>

</html>
